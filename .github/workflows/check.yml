---
name: Check (Ruff)

on:
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**/README*"
      - ".github/workflows/check_types.yml"
      - ".github/workflows/test.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4.1.0

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0

      - name: Install the project
        run: uv sync

      - name: Build the project with uv
        run: uv build

      - name: Run the built project to check it works
        run: .venv/bin/my-cool-app --help
